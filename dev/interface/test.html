<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ECOsINT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #2d3250; display: flex; height: 100vh; overflow: hidden; color: white; }
  .page { display: flex; flex: 1; flex-direction: column; }

  /* BANDE ENTREPRISE */
  .bande { background: #3d4466; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .bande-nom { font-size: 20px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #888; }
  .bande-secteur { font-size: 11px; color: #aaa; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  .logo-bande { height: 50px; object-fit: contain; }

  /* CONTENU */
  .contenu { display: flex; flex: 1; overflow: hidden; padding: 24px; gap: 24px; }

  /* COLONNE GAUCHE */
  .col-gauche { width: 160px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; align-items: center; }

  .badge-rang { width: 120px; height: 120px; border-radius: 50%; background: #1e2240; border: 2px solid #4a5080; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 12px; color: #ccc; line-height: 1.4; padding: 12px; }

  .btn-gauche { width: 140px; background: #1e2240; border: 1px solid #4a5080; border-radius: 6px; padding: 10px 14px; cursor: pointer; color: #ccc; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; text-align: left; }
  .btn-gauche:hover { background: #2a3060; }
  .btn-gauche.actif { background: #4a5080; color: white; }

  /* ZONE GRAPHIQUE */
  .graphique-zone { flex: 1; background: #111; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 14px; }

  /* POPUP */
  .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
  .popup-overlay.visible { display: block; }
  .popup { position: fixed; left: 210px; top: 50%; transform: translateY(-50%); width: 220px; background: #1e2240; border: 1px solid #4a5080; border-radius: 6px; z-index: 11; overflow: hidden; display: none; }
  .popup-section-titre { font-size: 10px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 14px 4px; background: #161830; }
  .popup-item { padding: 9px 14px; font-size: 13px; cursor: pointer; color: #ccc; border-bottom: 1px solid #2a2e50; }
  .popup-item:last-child { border-bottom: none; }
  .popup-item:hover { background: #2a3060; color: white; }
  .popup-item.actif { color: white; font-weight: 500; }

  /* MENU COMPARER */
  .menu-comp { position: fixed; left: 210px; top: 50%; transform: translateY(-50%); width: 220px; background: #1e2240; border: 1px solid #4a5080; border-radius: 6px; z-index: 11; display: none; flex-direction: column; max-height: 400px; overflow: hidden; }
  .menu-comp h3 { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 14px 6px; background: #161830; }
  .menu-comp input { margin: 8px; padding: 6px 10px; border: 1px solid #4a5080; border-radius: 4px; font-size: 12px; background: #2a2e50; color: white; outline: none; }
  .liste-comp { overflow-y: auto; flex: 1; }
  .comp-item { padding: 8px 14px; font-size: 12px; cursor: pointer; color: #ccc; border-bottom: 1px solid #2a2e50; }
  .comp-item:hover { background: #2a3060; color: white; }
  .comp-item.selected { color: white; font-weight: 500; background: #2a3060; }
</style>
</head>
<body>

<div class="page">

  <!-- BANDE ENTREPRISE -->
  <div class="bande">
    <div>
      <div class="bande-nom" id="nom-bande">Entreprise</div>
      <div class="bande-secteur" id="secteur-bande">CAC40</div>
    </div>
    <img class="logo-bande" id="logo-bande" src="" onerror="this.style.display='none'" />
  </div>

  <!-- CONTENU -->
  <div class="contenu">

    <!-- COLONNE GAUCHE -->
    <div class="col-gauche">
      <div class="badge-rang" id="badge-rang">—</div>
      <button class="btn-gauche" id="btn-graphiques" onclick="togglePopup()">Graphiques</button>
      <button class="btn-gauche" id="btn-comparer" onclick="toggleComparer()">Comparer</button>
    </div>

    <!-- GRAPHIQUE -->
    <div class="graphique-zone" id="graphique-zone">Sélectionne un graphique</div>

  </div>
</div>

<!-- POPUP GRAPHIQUES -->
<div class="popup-overlay" id="popup-overlay" onclick="fermerTout()"></div>
<div class="popup" id="popup">
  <div class="popup-section-titre">Financier</div>
  <div class="popup-item" onclick="setGraphique(this, 'Chiffre d\'affaires')">Chiffre d'affaires</div>
  <div class="popup-item" onclick="setGraphique(this, 'Dividende total')">Dividende total</div>
  <div class="popup-section-titre">Écologique</div>
  <div class="popup-item" onclick="setGraphique(this, 'Émissions totales par année')">Émissions totales</div>
  <div class="popup-item" onclick="setGraphique(this, 'CO₂ par € de dividende')">CO₂ / dividende</div>
  <div class="popup-item" onclick="setGraphique(this, 'Scope 1 par année')">Scope 1</div>
  <div class="popup-item" onclick="setGraphique(this, 'Scope 2 par année')">Scope 2</div>
  <div class="popup-section-titre">Classement</div>
  <div class="popup-item" onclick="setGraphique(this, 'Classement pollution CAC40')">Classement pollution</div>
  <div class="popup-section-titre">Judiciaire</div>
  <div class="popup-item" onclick="setGraphique(this, 'Décisions de justice')">Décisions de justice</div>
</div>

<!-- MENU COMPARER -->
<div class="menu-comp" id="menu-comp">
  <h3>Comparer avec</h3>
  <input type="text" placeholder="Rechercher..." oninput="filtrerComp(this.value)" />
  <div class="liste-comp" id="liste-comp"></div>
</div>

<script>
const euros = v => v == null ? '—' : new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', notation: 'compact', maximumFractionDigits: 1 }).format(v);
const nombre = v => v == null ? '—' : new Intl.NumberFormat('fr-FR', { notation: 'compact', maximumFractionDigits: 1 }).format(v);

const params = new URLSearchParams(window.location.search);
const nomCible = params.get('nom');
let toutesEntreprises = [];

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    toutesEntreprises = data;
    const e = data.find(x => x.nom === nomCible) || data[0];

    document.title = e.nom + ' — ECOsINT';
    document.getElementById('nom-bande').textContent = e.nom;
    const logo = 'logos/' + e.nom.toLowerCase().replace(/\s+/g, '') + '.png';
    document.getElementById('logo-bande').src = logo;

    const rang = e.co2e_per_eur_dividend_rank;
    const total = e.co2e_per_eur_dividend_rank_total;
    document.getElementById('badge-rang').textContent = rang
      ? rang + 'e entreprise\nla plus polluante\npar dividende'
      : '—';

    afficherComp(data.filter(x => x.nom !== e.nom));
  });

function togglePopup() {
  const popup = document.getElementById('popup');
  const overlay = document.getElementById('popup-overlay');
  const visible = popup.style.display === 'block';
  document.getElementById('menu-comp').style.display = 'none';
  document.getElementById('btn-comparer').classList.remove('actif');
  popup.style.display = visible ? 'none' : 'block';
  overlay.classList.toggle('visible', !visible);
  document.getElementById('btn-graphiques').classList.toggle('actif', !visible);
}

function toggleComparer() {
  const menu = document.getElementById('menu-comp');
  const overlay = document.getElementById('popup-overlay');
  const visible = menu.style.display === 'flex';
  document.getElementById('popup').style.display = 'none';
  document.getElementById('btn-graphiques').classList.remove('actif');
  menu.style.display = visible ? 'none' : 'flex';
  overlay.classList.toggle('visible', !visible);
  document.getElementById('btn-comparer').classList.toggle('actif', !visible);
}

function fermerTout() {
  document.getElementById('popup').style.display = 'none';
  document.getElementById('menu-comp').style.display = 'none';
  document.getElementById('popup-overlay').classList.remove('visible');
  document.getElementById('btn-graphiques').classList.remove('actif');
  document.getElementById('btn-comparer').classList.remove('actif');
}

function setGraphique(el, titre) {
  document.querySelectorAll('.popup-item').forEach(i => i.classList.remove('actif'));
  el.classList.add('actif');
  document.getElementById('graphique-zone').textContent = titre;
  fermerTout();
}

function afficherComp(liste) {
  const container = document.getElementById('liste-comp');
  container.innerHTML = '';
  liste.forEach(e => {
    const div = document.createElement('div');
    div.className = 'comp-item';
    div.textContent = e.nom;
    div.onclick = () => {
      document.querySelectorAll('.comp-item').forEach(x => x.classList.remove('selected'));
      div.classList.add('selected');
    };
    container.appendChild(div);
  });
}

function filtrerComp(val) {
  afficherComp(toutesEntreprises.filter(e => e.nom.toLowerCase().includes(val.toLowerCase())));
}
</script>

</body>
</html>

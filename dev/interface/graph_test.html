<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test graphiques</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
  select { padding: 8px; font-size: 14px; margin-bottom: 30px; width: 300px; }
  canvas { margin-bottom: 40px; }
</style>
</head>
<body>

<h2>Test graphiques émissions</h2>

<select id="choix-entreprise">
  <option value="Total">TotalEnergies</option>
  <option value="LVMH">LVMH</option>
  <option value="Engie">Engie</option>
  <option value="ArcelorMittal">ArcelorMittal</option>
  <option value="Sanofi">Sanofi</option>
</select>

<canvas id="graphique-emissions"></canvas>
<canvas id="graphique-scope"></canvas>

<script src="graphiques.js"></script>
<script>
  let chartEmissions = null;
  let chartScope = null;

  function charger(nom) {
    if (chartEmissions) chartEmissions.destroy();
    if (chartScope) chartScope.destroy();
    chartEmissions = initGraphiqueEmissions(nom);
    chartScope = initGraphiqueScope(nom);
  }

  document.getElementById('choix-entreprise').addEventListener('change', e => {
    charger(e.target.value);
  });

  charger('Total');
</script>

</body>
</html>

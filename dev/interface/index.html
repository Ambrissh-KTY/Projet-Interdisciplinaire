<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Moteur de recherche entreprises</title>
<style>
  body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; }
  #liste { width: 220px; border: 1px solid #ccc; padding: 10px; max-height: 90vh; overflow-y: auto; }
  #liste div { padding: 8px; cursor: pointer; border-radius: 4px; }
  #liste div:hover { background: #eee; }
  #detail { flex: 1; border: 1px solid #ccc; padding: 20px; }
  .bloc { padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; }
</style>
</head>
<body>

<div id="liste">
  <h3>CAC40</h3>
  <!-- généré automatiquement par JS -->
</div>

<div id="detail">
  <h2 id="nom">Sélectionnez une entreprise</h2>
  <div class="bloc">
    <strong>Financier</strong>
    <p>CA : <span id="ca"></span></p>
    <p>Dividende : <span id="div"></span></p>
  </div>
  <div class="bloc">
    <strong>Écologique</strong>
    <p>Émissions CO2 : <span id="co2"></span></p>
  </div>
  <div class="bloc">
    <strong>Pénal</strong>

  </div>

];

// Génère la liste à gauche
const liste = document.getElementById('liste');
entreprises.forEach((e, i) => {
  const div = document.createElement('div');
  div.textContent = e.nom;
  div.onclick = () => afficher(i);
  liste.appendChild(div);
});

// Affiche les détails à droite
function afficher(i) {
  const e = entreprises[i];
  document.getElementById('nom').textContent = e.nom;
  document.getElementById('ca').textContent = e.ca;
  document.getElementById('div').textContent = e.div;
  document.getElementById('co2').textContent = e.co2;
  document.getElementById('proces').innerHTML = e.proces.map(p => `<li>${p}</li>`).join('');
}

// === Données de la base (ajout équipe data) ===
// Remplit les champs vides ci-dessus avec data.json (généré par dev/db/export_json.py),
// en associant par LEI. Si data.json est absent, la liste fonctionne quand même.
fetch('./data.json')
  .then(r => r.json())
  .then(data => {
    const parLei = Object.fromEntries(data.map(d => [d.lei, d]));
    entreprises.forEach(e => Object.assign(e, parLei[e.lei]));
  })
  .catch(() => {});
</script>

</body>
</html>
